# Alembic Configuration
# =====================
# Usage:
#   Generate migration after changing a model:
#     python -m alembic revision --autogenerate -m "describe your change"
#
#   Apply all pending migrations:
#     python -m alembic upgrade head
#
#   Roll back one migration:
#     python -m alembic downgrade -1
#
#   Show current DB revision:
#     python -m alembic current
#
#   Show migration history:
#     python -m alembic history

[alembic]
# Path to the alembic/ directory
script_location = alembic

# sqlalchemy.url is set dynamically in env.py from config.py
# Do NOT set it here — it reads from config.ini at runtime.
sqlalchemy.url =

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .
version_path_separator = os
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
