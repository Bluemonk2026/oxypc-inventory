<VirtualHost *:80>
    # Change this to your actual subdomain
    ServerName erp.yourcompany.com
    
    # Forward all traffic to the local OxyPC FastAPI application
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/
    
    # Optional: Log files specific to OxyPC
    ErrorLog ${APACHE_LOG_DIR}/oxypc_error.log
    CustomLog ${APACHE_LOG_DIR}/oxypc_access.log combined
</VirtualHost>
