# nginx reverse proxy — copy to /etc/nginx/sites-available/oxypc
#
#   sudo cp deploy/nginx-oxypc.conf /etc/nginx/sites-available/oxypc
#   sudo ln -s /etc/nginx/sites-available/oxypc /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d erp.oxypc.in     # provisions free Let's Encrypt SSL + auto-renew
#
# certbot rewrites this file to add the TLS (443) server block and a HTTP->HTTPS redirect.

server {
    listen 80;
    server_name erp.oxypc.in;          # <-- change to your real subdomain

    # Allow large photo/document uploads (IQC images, KYC docs)
    client_max_body_size 50M;

    # Real client IP for login_logs / rate limiting
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}
