{% extends "base.html" %}
{% block title %}New Purchase Order — OxyPC{% endblock %}
{% block page_title %}New Purchase Order{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-header bg-transparent fw-semibold"><i class="bi bi-file-earmark-plus me-2"></i>Create Purchase Order</div>
  <div class="card-body">
    <form action="/crm/purchase-orders/new" method="post" id="poForm">
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label fw-semibold">PO Number</label>
          <input type="text" class="form-control font-monospace" value="{{ po_number }}" readonly>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">PO Date <span class="text-danger">*</span></label>
          <input type="date" name="po_date" class="form-control" value="{{ today }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Expected Delivery</label>
          <input type="date" name="expected_delivery_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">Advance Amount (₹)</label>
          <input type="number" name="advance_amount" class="form-control" min="0" step="0.01" placeholder="0">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Supplier Contact</label>
          <select name="contact_id" class="form-select">
            <option value="">— Select Supplier —</option>
            {% for c in contacts %}
            <option value="{{ c.id }}" {% if deal and deal.contact_id == c.id %}selected{% endif %}>{{ c.company_name }} {% if c.contact_person %}({{ c.contact_person }}){% endif %}</option>
            {% endfor %}
          </select>
        </div>
        {% if deal %}
        <div class="col-md-6">
          <label class="form-label">Linked Deal</label>
          <input type="hidden" name="deal_id" value="{{ deal.id }}">
          <input type="text" class="form-control" value="{{ deal.title }}" readonly>
        </div>
        {% endif %}
        <div class="col-md-6">
          <label class="form-label">Payment Terms</label>
          <input type="text" name="payment_terms" class="form-control" placeholder="e.g. 30% advance, balance on delivery">
        </div>
        <div class="col-md-6">
          <label class="form-label">Delivery Address</label>
          <input type="text" name="delivery_address" class="form-control" placeholder="Delivery address">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Additional notes"></textarea>
        </div>
      </div>

      <!-- Line Items -->
      <div class="fw-semibold mb-2 mt-3"><i class="bi bi-list-ul me-1"></i>Line Items</div>
      <table class="table table-bordered small" id="lineItemsTable">
        <thead class="table-light">
          <tr><th>Description <span class="text-danger">*</span></th><th style="width:80px">Qty</th><th style="width:130px">Unit Price (₹)</th><th style="width:130px">Total (₹)</th><th style="width:40px"></th></tr>
        </thead>
        <tbody id="lineItemsBody">
          <tr>
            <td><input type="text" name="description[]" class="form-control form-control-sm" placeholder="Item description" required></td>
            <td><input type="number" name="qty[]" class="form-control form-control-sm qty-input" value="1" min="1"></td>
            <td><input type="number" name="unit_price[]" class="form-control form-control-sm price-input" min="0" step="0.01" placeholder="0"></td>
            <td><input type="text" class="form-control form-control-sm line-total" readonly placeholder="0.00"></td>
            <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3" class="text-end fw-semibold">Grand Total:</td>
            <td><input type="text" id="grandTotal" class="form-control form-control-sm fw-bold" readonly placeholder="0.00"></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
      <button type="button" class="btn btn-outline-secondary btn-sm mb-3" id="addRow"><i class="bi bi-plus-circle me-1"></i>Add Row</button>

      <div class="d-flex gap-2 mt-2">
        <button type="submit" class="btn btn-success px-4"><i class="bi bi-check-circle me-2"></i>Create PO</button>
        <a href="/crm/purchase-orders" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
function calcRow(row) {
  const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
  const price = parseFloat(row.querySelector('.price-input').value) || 0;
  const total = qty * price;
  row.querySelector('.line-total').value = total.toFixed(2);
  calcGrandTotal();
}
function calcGrandTotal() {
  let grand = 0;
  document.querySelectorAll('.line-total').forEach(el => grand += parseFloat(el.value) || 0);
  document.getElementById('grandTotal').value = grand.toFixed(2);
}
function newRow() {
  const tr = document.querySelector('#lineItemsBody tr').cloneNode(true);
  tr.querySelectorAll('input').forEach(i => {
    if (i.classList.contains('qty-input')) i.value = '1';
    else if (i.classList.contains('line-total')) i.value = '0.00';
    else if (i.tagName === 'INPUT') i.value = '';
  });
  tr.querySelector('.remove-row').addEventListener('click', () => {
    if (document.querySelectorAll('#lineItemsBody tr').length > 1) { tr.remove(); calcGrandTotal(); }
  });
  bindRow(tr);
  document.getElementById('lineItemsBody').appendChild(tr);
}
function bindRow(tr) {
  tr.querySelector('.qty-input').addEventListener('input', () => calcRow(tr));
  tr.querySelector('.price-input').addEventListener('input', () => calcRow(tr));
}
document.querySelectorAll('#lineItemsBody tr').forEach(tr => {
  bindRow(tr);
  tr.querySelector('.remove-row')?.addEventListener('click', () => {
    if (document.querySelectorAll('#lineItemsBody tr').length > 1) { tr.remove(); calcGrandTotal(); }
  });
});
document.getElementById('addRow').addEventListener('click', newRow);
</script>
{% endblock %}
