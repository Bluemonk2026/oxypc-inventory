{% extends "base.html" %}
{% block title %}New Order — {{ dealer.business_name }} — OxyPC{% endblock %}
{% block page_title %}New Dealer Order — {{ dealer.business_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent fw-semibold">
        <i class="bi bi-receipt me-2"></i>Record New Order
      </div>
      <div class="card-body">
        <form method="post" action="/dealers/{{ dealer.id }}/orders/new">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Order Number</label>
              <input type="text" name="order_number" class="form-control form-control-sm"
                     value="{{ order_number }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Order Date <span class="text-danger">*</span></label>
              <input type="date" name="order_date" class="form-control form-control-sm"
                     value="{{ today }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Invoice Number</label>
              <input type="text" name="invoice_number" class="form-control form-control-sm"
                     placeholder="INV-XXXX">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Items Description</label>
              <textarea name="items_description" class="form-control form-control-sm" rows="3"
                        placeholder="e.g. 5× Dell Latitude i5 Grade B, 3× HP EliteBook i7 Grade A"></textarea>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Total Amount (₹) <span class="text-danger">*</span></label>
              <input type="number" name="total_amount" class="form-control form-control-sm"
                     min="0" step="0.01" placeholder="0" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Paid Now (₹)</label>
              <input type="number" name="paid_amount" class="form-control form-control-sm"
                     min="0" step="0.01" value="0">
            </div>
            <div class="col-md-3">
              <label class="form-label">Payment Mode</label>
              <select name="payment_mode" class="form-select form-select-sm">
                <option value="">— Select —</option>
                <option value="cash">Cash</option>
                <option value="upi">UPI</option>
                <option value="neft">NEFT</option>
                <option value="rtgs">RTGS</option>
                <option value="cheque">Cheque</option>
                <option value="credit">Credit</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Payment Due Date</label>
              <input type="date" name="payment_due_date" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label">Notes</label>
              <input type="text" name="notes" class="form-control form-control-sm" placeholder="Any notes">
            </div>
            <div class="col-12 d-flex gap-2">
              <button type="submit" class="btn btn-success btn-sm px-4">
                <i class="bi bi-check-circle me-1"></i>Create Order
              </button>
              <a href="/dealers/{{ dealer.id }}" class="btn btn-outline-secondary btn-sm">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
