<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ code }} — OxyPC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;}</style>
</head>
<body>
<div class="text-center">
  <h1 class="display-1 fw-bold text-muted">{{ code }}</h1>
  <h4>{{ message }}</h4>
  {% if detail %}
  <div class="alert alert-warning text-start mt-4 mx-auto" style="max-width:700px;font-size:.85rem">
    <strong>Error detail (internal — not shown to public):</strong><br>
    <pre class="mb-0 mt-2" style="white-space:pre-wrap;word-break:break-all">{{ detail }}</pre>
  </div>
  {% endif %}
  <a href="/" class="btn btn-primary mt-3">Go to Dashboard</a>
  <a href="/auth/login" class="btn btn-outline-secondary mt-3 ms-2">Login</a>
</div>
</body>
</html>
