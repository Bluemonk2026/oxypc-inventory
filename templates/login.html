<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Inventory Lifecycle</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    body { background: #0f1923; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 380px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .login-header { background: linear-gradient(135deg, #1a56db 0%, #0d3b8c 100%); padding: 2rem; text-align: center; }
    .login-body { background: #fff; padding: 2rem; }
    .brand-icon { font-size: 3rem; color: #fff; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="brand-icon"><i class="bi bi-laptop"></i></div>
    <h3 class="text-white fw-bold mt-2 mb-0">Inventory Lifecycle</h3>
    <small class="text-white-50">Refurbishment Management System</small>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert alert-danger py-2 mb-3"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}
    <form action="/auth/login" method="post">
      <input type="hidden" name="csrf_token" value="{{ login_csrf }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <p class="text-center text-muted small mt-3 mb-0">Contact admin for account access</p>
  </div>
</div>
</body>
</html>
