{% extends "base.html" %}
{% block title %}Return — OxyPC{% endblock %}
{% block page_title %}Process Return{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent fw-semibold"><i class="bi bi-arrow-return-left me-2"></i>Process Return</div>
      <div class="card-body">
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form action="/returns/new" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Device Tag Number</label>
            <input type="text" name="barcode" class="form-control barcode-field font-monospace" placeholder="Scan tag number" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Return Reason</label>
            <select name="reason" class="form-select">
              <option value="">-- Select reason --</option>
              <option>Not working</option><option>Wrong item</option><option>Customer changed mind</option>
              <option>Dead on arrival</option><option>Physical damage</option><option>Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Condition on Return</label>
            <select name="condition_on_return" class="form-select">
              <option value="">-- Select --</option>
              <option>As sold</option><option>Minor damage</option><option>Major damage</option><option>Non-functional</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Refund Amount (₹)</label>
            <div class="input-group"><span class="input-group-text">₹</span>
              <input type="number" name="refund_amount" class="form-control" placeholder="0" min="0" step="0.01">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="2"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning px-4"><i class="bi bi-arrow-return-left me-2"></i>Process Return</button>
            <a href="/sales" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
