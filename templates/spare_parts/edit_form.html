{% extends "base.html" %}
{% block title %}Edit Part — OxyPC{% endblock %}
{% block page_title %}Edit Spare Part{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent fw-semibold"><i class="bi bi-pencil me-2"></i>Edit: {{ part.part_code }} — {{ part.name }}</div>
      <div class="card-body">
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form action="/spare-parts/{{ part.id }}/edit" method="post">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Part Code</label>
              <input type="text" class="form-control font-monospace" value="{{ part.part_code }}" readonly disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category</label>
              <select name="category" class="form-select" required>
                {% for cat in categories %}
                <option {% if cat == part.category %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Part Name</label>
              <input type="text" name="name" class="form-control" value="{{ part.name }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Unit Price (₹)</label>
              <div class="input-group">
                <span class="input-group-text">₹</span>
                <input type="number" name="unit_price" class="form-control" value="{{ part.unit_price }}" min="0" step="0.01">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Low Stock Alert (qty)</label>
              <input type="number" name="min_stock_alert" class="form-control" value="{{ part.min_stock_alert }}" min="0">
            </div>
            <div class="col-12">
              <label class="form-label">Supplier</label>
              <input type="text" name="supplier" class="form-control" value="{{ part.supplier or '' }}" placeholder="Supplier name">
            </div>
            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea name="notes" class="form-control" rows="2">{{ part.notes or '' }}</textarea>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-2"></i>Save Changes</button>
            <a href="/spare-parts" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
